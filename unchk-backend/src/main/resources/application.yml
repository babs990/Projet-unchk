server:
  port: ${PORT:8081}

spring:
  application:
    name: unchk-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ─── Sécurité service-à-service ────────────────────────────────────────────
# Le Middle Tier Express.js doit envoyer ce token dans le header
# X-Internal-Token sur chaque appel. Aucun autre mécanisme d'auth :
# ce service n'est jamais exposé directement au frontend Angular.
unchk:
  internal-token: ${INTERNAL_SERVICE_TOKEN:changez_ce_token_partage_avec_le_middle}
  universite:
    nom: "Université Cheikh Hamidou Kane"
    sigle: "UNCHK"
    ville: "Dakar / Saint-Louis, Sénégal"

# ─── Logs ────────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    sn.unchk.backend: DEBUG

# ─── Documentation Swagger ───────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
